<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wild Dump Prevention</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('dashboard') }}">
      <span class="brand-mark">W</span>
      <span>Wild Dump Prevention</span>
    </a>
    <nav>
      <a class="{{ 'active' if request.path == '/' else '' }}" href="{{ url_for('dashboard') }}">Dashboard</a>
      <a class="{{ 'active' if request.path == '/upload' else '' }}" href="{{ url_for('upload') }}">Upload</a>
      <a class="{{ 'active' if request.path.startswith('/images') else '' }}" href="{{ url_for('images') }}">Images</a>
    </nav>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="messages">
          {% for category, message in messages %}
            <div class="message {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
